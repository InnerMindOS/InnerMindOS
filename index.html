<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerMindOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            overflow: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .bg-animation span {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 15s infinite;
        }

        .bg-animation span:nth-child(1) { width: 80px; height: 80px; top: 20%; left: 10%; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { width: 120px; height: 120px; top: 60%; left: 80%; animation-delay: 2s; }
        .bg-animation span:nth-child(3) { width: 60px; height: 60px; top: 80%; left: 30%; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { width: 150px; height: 150px; top: 10%; left: 70%; animation-delay: 6s; }
        .bg-animation span:nth-child(5) { width: 40px; height: 40px; top: 50%; left: 50%; animation-delay: 8s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-60px) rotate(180deg); opacity: 0.6; }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 700px;
        }

        .logo {
            margin-bottom: 2.5rem;
        }

        .logo img {
            max-width: 320px;
            width: 80vw;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(0, 210, 211, 0.3));
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, #a18cd1, #fbc2eb, #a6c1ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 1s ease forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease 0.3s forwards;
            opacity: 0;
        }

        .notify-form {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 1s ease 0.6s forwards;
            opacity: 0;
        }

        .notify-form input {
            padding: 0.9rem 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1rem;
            width: 280px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        .notify-form input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .notify-form input:focus {
            border-color: rgba(161, 140, 209, 0.8);
        }

        .notify-form button {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            color: #1a1a2e;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .notify-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(161, 140, 209, 0.4);
        }

        .socials {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            animation: fadeInUp 1s ease 0.9s forwards;
            opacity: 0;
        }

        .socials a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .socials a:hover {
            color: #fbc2eb;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="InnerMindOS">
        </div>
        <h1>Coming Soon</h1>
        <p class="subtitle">We're crafting something extraordinary. Stay tuned for an experience that will redefine how you interact with your inner world.</p>

        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thank you! We will notify you.');">
            <input type="email" placeholder="Enter your email" required>
            <button type="submit">Notify Me</button>
        </form>

        <div class="socials">
            <a href="#">Twitter</a>
            <a href="#">GitHub</a>
            <a href="#">Discord</a>
        </div>
    </div>
</body>
</html>
